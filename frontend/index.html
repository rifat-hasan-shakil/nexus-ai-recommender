<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recommender Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: '#e50914' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        
        /* Dark Mode Theme */
        .dark body { background-color: #0b0c10; color: #f8f8f8; }
        .dark .glass { background: rgba(30, 30, 36, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .dark .card-hover:hover { box-shadow: 0 25px 50px rgba(0,0,0,0.8); border-color: rgba(229, 9, 20, 0.6); }
        .dark .bg-select { background-color: rgba(11, 12, 16, 0.9); color: white; border-color: rgba(255, 255, 255, 0.2); }
        .dark .bg-badge { background-color: rgba(0,0,0,0.6); color: #fbbf24; border-color: rgba(234,179,8,0.4); }
        .dark .text-param { color: #d0d0e0; }
        .dark .heading-text { color: white; }

        /* Light Mode Theme */
        html:not(.dark) body { background-color: #f3f4f6; color: #111827; }
        html:not(.dark) .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        html:not(.dark) .card-hover:hover { box-shadow: 0 25px 40px rgba(0,0,0,0.12); border-color: rgba(229, 9, 20, 0.4); }
        html:not(.dark) .bg-select { background-color: #ffffff; color: #111827; border-color: #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        html:not(.dark) .bg-badge { background-color: #fef3c7; color: #b45309; border-color: #fcd34d; }
        html:not(.dark) .text-param { color: #4b5563; }
        html:not(.dark) .heading-text { color: #111827; }

        /* Core Transitions */
        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-8px); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        .dark ::-webkit-scrollbar-track { background: #0b0c10; }
        html:not(.dark) ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff4b4b; }
        
        /* Spinner */
        .spinner { border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: white; width: 22px; height: 22px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        ::selection { background: #e50914; color: white; }
    </style>
</head>
<body class="min-h-screen pt-16 pb-24 px-4 sm:px-8 relative overflow-x-hidden">
    
    <!-- Theme Toggle Button -->
    <button onclick="toggleTheme()" class="fixed top-6 right-6 z-50 p-3.5 rounded-full bg-white/50 dark:bg-black/40 backdrop-blur-md border border-gray-300 dark:border-gray-700 shadow-xl hover:scale-110 transition-transform">
        <span id="theme-icon" class="flex items-center justify-center"></span>
    </button>

    <!-- Background cinematic glow effects -->
    <div class="fixed top-[-10%] left-[10%] w-[600px] h-[600px] bg-brand/10 dark:bg-brand/15 rounded-full blur-[140px] -z-10 pointer-events-none transition-colors"></div>
    <div class="fixed bottom-[-10%] right-[10%] w-[800px] h-[800px] bg-blue-500/10 dark:bg-blue-900/15 rounded-full blur-[160px] -z-10 pointer-events-none transition-colors"></div>

    <main class="max-w-[95%] lg:max-w-7xl mx-auto z-10 pt-4">
        <header class="text-center mb-16 relative">
            <h1 class="text-5xl sm:text-6xl md:text-7xl font-black tracking-tight mb-6 inline-block text-transparent bg-clip-text bg-gradient-to-br from-gray-800 via-gray-600 to-gray-400 dark:from-white dark:via-gray-300 dark:to-gray-500 drop-shadow-xl transition-all">
                Nexus <span class="bg-clip-text text-transparent bg-gradient-to-r from-brand to-orange-500">AI</span> 
            </h1>
            <p class="text-xl md:text-2xl text-gray-500 dark:text-gray-400 font-light tracking-wide transition-colors">Select a title. Discover a universe.</p>
        </header>

        <!-- Control Panel -->
        <section class="glass rounded-[2rem] p-6 lg:p-10 mb-16 border-t border-black/5 dark:border-white/10 relative overflow-hidden transition-colors">
            <div class="absolute inset-0 bg-gradient-to-b from-black/5 dark:from-white/5 to-transparent pointer-events-none rounded-[2rem]"></div>
            
            <div class="flex justify-center gap-4 sm:gap-6 mb-10 relative z-10">
                <button id="btn-movies" class="px-6 sm:px-8 py-3.5 rounded-full font-bold text-base sm:text-lg transition-all duration-300 transform scale-105 shadow-[0_0_20px_rgba(229,9,20,0.3)] bg-brand text-white" onclick="setMode('Movies')">🎬 Movies</button>
                <button id="btn-anime" class="px-6 sm:px-8 py-3.5 rounded-full font-bold text-base sm:text-lg transition-all duration-300 border text-gray-600 dark:text-gray-400 border-gray-300 dark:border-gray-700 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10" onclick="setMode('Anime')">🌸 Anime</button>
            </div>

            <div class="flex flex-col md:flex-row gap-5 items-center relative z-10">
                <div class="relative w-full md:flex-1">
                    <input type="text" id="search-input" list="search-datalist" autocomplete="off" placeholder="Start typing to search..." class="bg-select w-full rounded-2xl px-6 py-4 h-[64px] text-lg sm:text-xl font-semibold outline-none focus:border-brand focus:ring-2 focus:ring-brand shadow-inner transition-all placeholder-gray-500 dark:placeholder-gray-400">
                    <datalist id="search-datalist">
                        <option value="Initializing Database...">
                    </datalist>
                    <!-- Search Icon -->
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-gray-500 dark:text-gray-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>
                
                <button id="submit-btn" onclick="fetchRecommendations()" class="w-full md:w-auto h-[64px] bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white font-bold px-10 text-xl rounded-2xl shadow-xl hover:shadow-[0_15px_30px_rgba(229,9,20,0.4)] flex items-center justify-center gap-3 transition-all transform hover:-translate-y-1">
                    <span id="btn-text" class="tracking-wide">Find Matches</span>
                    <div id="btn-spinner" class="spinner hidden"></div>
                </button>
            </div>
        </section>

        <!-- Results Area -->
        <section id="results-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 xl:gap-8 pb-12">
            <!-- Populated via JS -->
        </section>
    </main>

    <script>
        let currentMode = 'Movies';
        const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:8000/api' : '/api';

        // Icons
        const sunIcon = `<svg class="w-6 h-6 text-yellow-500 drop-shadow-[0_0_10px_rgba(234,179,8,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>`;
        const moonIcon = `<svg class="w-6 h-6 text-indigo-500 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>`;

        // Theme Setup
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.innerHTML = moonIcon;
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.innerHTML = sunIcon;
            }
        }

        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            document.getElementById('theme-icon').innerHTML = moonIcon;
        } else {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').innerHTML = sunIcon;
        }

        async function setMode(mode) {
            currentMode = mode;
            const mBtn = document.getElementById('btn-movies');
            const aBtn = document.getElementById('btn-anime');
            const activeClasses = 'bg-brand text-white shadow-[0_0_20px_rgba(229,9,20,0.3)] transform scale-105 border-transparent'.split(' ');
            const inactiveClasses = 'border text-gray-600 dark:text-gray-400 border-gray-300 dark:border-gray-700 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transform scale-100 shadow-none'.split(' ');

            if (mode === 'Movies') {
                mBtn.classList.remove(...inactiveClasses); mBtn.classList.add(...activeClasses);
                aBtn.classList.remove(...activeClasses); aBtn.classList.add(...inactiveClasses);
            } else {
                aBtn.classList.remove(...inactiveClasses); aBtn.classList.add(...activeClasses);
                mBtn.classList.remove(...activeClasses); mBtn.classList.add(...inactiveClasses);
            }

            const input = document.getElementById('search-input');
            const dataList = document.getElementById('search-datalist');
            input.value = '';
            input.placeholder = `Search for a ${mode === 'Movies' ? 'movie' : 'anime'}...`;
            dataList.innerHTML = '<option value="Loading database...">';
            document.getElementById('results-container').innerHTML = '';
            
            try {
                const res = await fetch(`${API_URL}/${mode.toLowerCase()}`);
                const data = await res.json();
                dataList.innerHTML = (data[mode.toLowerCase()] || []).map(t => `<option value="${t.replace(/"/g, '&quot;')}">`).join('');
            } catch (e) {
                console.error(e);
                input.placeholder = 'Database Error. Ensure API is running.';
                dataList.innerHTML = '';
            }
        }

        async function fetchRecommendations() {
            const query = document.getElementById('search-input').value;
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const container = document.getElementById('results-container');
            
            if (!query || query.includes('Loading') || query.includes('Database Error')) return;

            btnText.textContent = "Analyzing...";
            btnSpinner.classList.remove('hidden');
            container.innerHTML = '';

            try {
                const res = await fetch(`${API_URL}/recommend/${currentMode.toLowerCase()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: query })
                });
                
                const data = await res.json();
                const recs = (data.recommendations || []).slice(0, 5); // Ensure exactly 5

                container.innerHTML = recs.map((rec, i) => `
                    <div class="flex flex-col gap-4 opacity-0 translate-y-12" style="animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${i * 0.15}s forwards;">
                        <div class="relative group cursor-pointer aspect-[2/3] rounded-[1.5rem] overflow-hidden shadow-2xl transition-all duration-500 hover:scale-[1.05] hover:-translate-y-2 hover:z-50 border border-gray-300 dark:border-white/10 dark:shadow-[0_15px_30px_rgba(0,0,0,0.6)] shadow-[0_15px_30px_rgba(0,0,0,0.15)]">
                            <img src="${rec.poster}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 bg-gray-200 dark:bg-gray-800">
                            
                            <!-- Hover Overlay -->
                            <div class="absolute inset-0 bg-white/95 dark:bg-black/90 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-5 backdrop-blur-sm">
                                <div class="flex flex-wrap gap-1.5 mb-3 mt-auto w-full items-center">
                                <span class="bg-yellow-500/20 text-yellow-600 dark:text-yellow-500 border border-yellow-500/50 text-[10px] px-2 py-0.5 rounded font-black tracking-wider shadow-inner">⭐ ${rec.rating || 'N/A'}</span>
                                ${rec.year && rec.year !== 'N/A' ? `<span class="bg-black/10 dark:bg-white/10 text-gray-800 dark:text-white/90 border border-black/20 dark:border-white/20 text-[10px] px-2 py-0.5 rounded font-bold tracking-wide shadow-inner">${rec.year}</span>` : ''}
                                ${rec.category && rec.category !== 'N/A' ? `<span class="bg-black/10 dark:bg-white/10 text-gray-800 dark:text-white/90 border border-black/20 dark:border-white/20 text-[10px] px-2 py-0.5 rounded font-bold tracking-wide shadow-inner">${rec.category}</span>` : ''}
                                ${rec.run_time && rec.run_time !== 'N/A' ? `<span class="bg-blue-500/10 dark:bg-blue-500/20 text-blue-800 dark:text-blue-300 border border-blue-500/30 text-[10px] px-2 py-0.5 rounded font-bold shadow-inner">${rec.run_time}</span>` : ''}
                                ${rec.studios && rec.studios !== 'N/A' ? `<span class="bg-purple-500/10 dark:bg-purple-500/20 text-purple-800 dark:text-purple-300 border border-purple-500/30 text-[10px] px-2 py-0.5 rounded font-bold shadow-inner truncate max-w-[90%]" title="${rec.studios.replace(/"/g, '&quot;')}">🎬 ${rec.studios}</span>` : ''}
                            </div>
                            <div class="flex mb-3">
                                <a href="${rec.link}" target="_blank" class="bg-brand/10 dark:bg-brand/20 text-brand border border-brand/50 hover:bg-brand hover:text-white transition-colors text-[10px] px-2.5 py-0.5 rounded font-black uppercase tracking-widest shadow-inner inline-block w-max">Source ➔</a>
                            </div>
                                <h4 class="text-gray-500 dark:text-gray-400 uppercase tracking-widest text-[10px] font-black mb-2 border-b border-gray-300 dark:border-gray-700 pb-1">Synopsis</h4>
                                <p class="text-param text-xs leading-relaxed font-semibold dark:font-light line-clamp-[6] xl:line-clamp-[8]">${rec.overview}</p>
                            </div>
                        </div>
                        <h3 class="heading-text font-black text-lg text-center leading-snug drop-shadow-sm px-1 line-clamp-2" title="${rec.title.replace(/"/g, '&quot;')}">${rec.title}</h3>
                    </div>
                `).join('');
                
            } catch(e) {
                container.innerHTML = '<p class="text-red-500 text-center text-xl font-bold">Engine failed to respond. Reload or try again.</p>';
            }
            
            btnText.textContent = "Match Profile 🔥";
            btnSpinner.classList.add('hidden');
        }

        window.onload = () => setMode('Movies');
    </script>
</body>
</html>
